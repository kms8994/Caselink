services:
  - type: web
    name: caselink-api
    runtime: python
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: USE_SAMPLE_DATA
        value: "true"
      - key: BACKEND_CORS_ORIGINS
        value: "*"
      - key: EMBEDDING_DEVICE
        value: cpu
      - key: EMBEDDING_MODEL
        value: intfloat/multilingual-e5-large
      - key: INTAKE_LLM_PROVIDER
        value: gemini
      - key: INTAKE_LLM_MODEL
        value: gemini-2.5-flash-lite
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
